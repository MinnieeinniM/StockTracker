<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>持股記錄</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f1f0ec;
  --border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);
  --text:#1a1a18;--text2:#6b6a65;--text3:#a09f9a;
  --info-bg:#e6f1fb;--info-t:#0c447c;--info-bd:#b5d4f4;
  --warn-bg:#faeeda;--warn-t:#633806;--warn-bd:#fac775;
  --danger-bg:#fcebeb;--danger-t:#a32d2d;--danger-bd:#f7c1c1;
  --success-bg:#eaf3de;--success-t:#3b6d11;--success-bd:#c0dd97;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--surface:#252523;--surface2:#2e2e2b;
  --border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.18);
  --text:#f0efe9;--text2:#9a9990;--text3:#6a6965;
  --info-bg:#0c2340;--info-t:#85b7eb;--info-bd:#185fa5;
  --warn-bg:#2e1f06;--warn-t:#fac775;--warn-bd:#633806;
  --danger-bg:#2d0e0e;--danger-t:#f09595;--danger-bd:#791f1f;
  --success-bg:#162004;--success-t:#97c459;--success-bd:#3b6d11;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:980px;margin:0 auto;padding:1.5rem 1rem}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:500;flex:1;min-width:120px}
.btn{padding:7px 13px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--surface2)}.btn:active{opacity:.8}
.btn-primary{background:var(--info-bg);border-color:var(--info-bd);color:var(--info-t);font-weight:500}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-danger{background:var(--danger-bg);border-color:var(--danger-bd);color:var(--danger-t)}
.btn-warn{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn-t)}
/* filter bars */
.filter-section{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:10px 14px;margin-bottom:1rem}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-row+.filter-row{margin-top:6px}
.filter-label{font-size:12px;color:var(--text2);min-width:36px}
.chip{padding:4px 12px;border-radius:999px;border:.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap}
.chip.active{background:var(--info-bg);border-color:var(--info-bd);color:var(--info-t);font-weight:500}
.chip:hover:not(.active){background:var(--border)}
/* price bar */
.pricebar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:10px 14px;font-size:13px}
.pricebar .hint{color:var(--text2);flex:1}
.price-status{font-size:12px;color:var(--text3)}
/* stock cards */
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:1.5rem}
.stock-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:1rem 1.1rem;cursor:pointer;transition:border-color .15s}
.stock-card:hover{border-color:var(--border2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ticker{font-size:16px;font-weight:500}
.badge{font-size:11px;padding:2px 7px;border-radius:var(--r);display:inline-block}
.badge-broker{background:var(--info-bg);color:var(--info-t);margin-left:3px}
.badge-op{background:var(--surface2);color:var(--text2)}
.badge-multi{background:var(--warn-bg);color:var(--warn-t);margin-left:3px}
/* sub-cards: per broker/operator breakdown inside card */
.sub-row{border-top:.5px dashed var(--border);margin-top:6px;padding-top:6px;font-size:12px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;align-items:center}
.sub-label{color:var(--text2);font-size:11px;grid-column:1/-1;margin-bottom:2px}
.sub-total{grid-column:1/-1;border-top:.5px solid var(--border);padding-top:4px;margin-top:2px;font-size:12px;font-weight:500;display:flex;justify-content:space-between}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.stat{font-size:12px;color:var(--text2)}.stat span{display:block;font-size:14px;font-weight:500;color:var(--text);margin-top:1px}
.gain{color:#c0392b!important}.loss{color:#27ae60!important}
.yield-badge{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--warn-bg);color:var(--warn-t);display:inline-block;margin-top:4px}
/* detail */
.panel{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1.25rem}
.sc-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem}
.sc{flex:1;min-width:110px;background:var(--surface2);border-radius:var(--r);padding:10px 13px}
.sc-label{font-size:11px;color:var(--text2)}.sc-val{font-size:18px;font-weight:500;margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:5px 12px;border-radius:var(--r);font-size:13px;cursor:pointer;border:.5px solid transparent;color:var(--text2)}
.tab.active{background:var(--info-bg);color:var(--info-t);border-color:var(--info-bd)}
.tab:not(.active):hover{background:var(--surface2)}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;border-bottom:.5px solid var(--border);color:var(--text2);font-weight:400;white-space:nowrap}
td{padding:8px 10px;border-bottom:.5px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
.sum-row td{background:var(--surface2);font-weight:500;border-top:.5px solid var(--border2)!important}
.group-header td{background:var(--info-bg);color:var(--info-t);font-weight:500;font-size:12px}
.tag{font-size:11px;padding:2px 7px;border-radius:999px;display:inline-block}
.tag-buy{background:var(--danger-bg);color:var(--danger-t)}
.tag-sell{background:var(--success-bg);color:var(--success-t)}
.div-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border);font-size:13px;gap:8px}
.div-item:last-of-type{border-bottom:none}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--surface);border-radius:var(--rl);border:.5px solid var(--border2);padding:1.5rem;width:400px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem}
.modal-section{border-top:.5px solid var(--border);margin-top:1rem;padding-top:1rem}
.modal-section-title{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.form-row{margin-bottom:11px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:3px}
.form-row input,.form-row select{width:100%;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit}
.form-row .hint-text{font-size:11px;color:var(--text3);margin-top:3px}
.modal-btns{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end;flex-wrap:wrap}
.price-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.price-row label{font-size:13px;color:var(--text2);white-space:nowrap}
.price-row input{width:110px;padding:6px 10px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px}
.broker-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.broker-item{display:flex;align-items:center;gap:6px;background:var(--surface2);padding:4px 10px;border-radius:999px;font-size:13px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--info-t);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.search-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);z-index:10;max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.autocomplete-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:.5px solid var(--border)}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover,.autocomplete-item.highlighted{background:var(--info-bg);color:var(--info-t)}
.autocomplete-code{font-weight:500;margin-right:6px}
.autocomplete-name{color:var(--text2)}
.step-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--info-bg);color:var(--info-t);font-size:11px;font-weight:600;margin-right:4px}
.action-cell{display:flex;gap:4px;justify-content:flex-end}
/* sortable table header */
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text)}
th.sortable .sort-icon{font-size:10px;margin-left:3px;opacity:.5}
th.sortable.sort-asc .sort-icon::after{content:'▲';opacity:1}
th.sortable.sort-desc .sort-icon::after{content:'▼';opacity:1}
th.sortable:not(.sort-asc):not(.sort-desc) .sort-icon::after{content:'⇅'}
/* smart date input */
.date-input-wrap{display:flex;flex-direction:column;gap:5px}
.date-input-native{width:100%;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer}
.date-input-native::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.6}
.date-quick-btns{display:flex;gap:5px;flex-wrap:wrap}
.date-quick-btn{padding:3px 9px;font-size:11px;border-radius:999px;border:.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.date-quick-btn:hover{background:var(--info-bg);color:var(--info-t);border-color:var(--info-bd)}
</style>
</head>

let _fileHandle=null;

const FS_SUPPORTED=typeof window.showOpenFilePicker==="function";

async function requestFileAccess(){
  if(!FS_SUPPORTED){alert("請使用 Chrome 或 Edge 開啟此功能。");return;}
  try{
    const [handle]=await window.showOpenFilePicker({
      types:[{description:"HTML 檔案",accept:{"text/html":[".html",".htm"]}}],multiple:false
    });
    const perm=await handle.requestPermission({mode:"readwrite"});
    if(perm!=="granted"){alert("未取得寫入權限。");return;}
    _fileHandle=handle;
    _saveStatus="✓ 已連結檔案";
    render();
    await writeToFile();
  }catch(e){if(e.name!=="AbortError") alert("授權失敗："+e.message);}
}

async function writeToFile(){
  if(!_fileHandle)return;
  try{
    const file=await _fileHandle.getFile();
    let html=await file.text();
    const ms="/*DATA_START*/",me="/*DATA_END*/";
    const toSave={...state,_saved:true};
    const newData=`${ms}\nconst DEMO=${JSON.stringify(toSave,null,0)};\n${me}`;
    html=html.includes(ms)
      ?html.replace(/\/\*DATA_START\*\/[\s\S]*?\/\*DATA_END\*\//,newData)
      :html.replace(/const DEMO\s*=\s*\{[\s\S]*?\};\s*\n/,newData+"\n");
    const writable=await _fileHandle.createWritable();
    await writable.write(html);
    await writable.close();
    _saveStatus="✓ 已存回 "+new Date().toLocaleTimeString('zh-TW',{hour12:false});
    try{localStorage.setItem('stock_v5',JSON.stringify(state));}catch(e){}
    const el=document.getElementById('save-status');
    if(el) el.textContent=_saveStatus;
  }catch(e){
    _saveStatus="⚠ 存檔失敗："+e.message;
    const el=document.getElementById('save-status');
    if(el) el.textContent=_saveStatus;
  }
}

function save(){

let _ghToken=localStorage.getItem('gh_token')||"";
let _ghRepo=localStorage.getItem('gh_repo')||"";   // e.g. "username/StockTracker"
let _ghPath=localStorage.getItem('gh_path')||"";   // e.g. "index.html"
let _ghSha="";
let _ghStatus="";
let _ghSyncing=false;

async function ghFetchSha(){
  if(!_ghToken||!_ghRepo||!_ghPath) return;
  try{
    const r=await fetch(`https://api.github.com/repos/${_ghRepo}/contents/${_ghPath}`,{
      headers:{"Authorization":"token "+_ghToken,"Accept":"application/vnd.github.v3+json"}
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d=await r.json();
    _ghSha=d.sha||"";
  }catch(e){console.warn("ghFetchSha",e);}
}

async function writeToGitHub(){
  if(!_ghToken||!_ghRepo||!_ghPath||_ghSyncing) return;
  _ghSyncing=true;
  _ghStatus="⏳ 同步中…";
  updateGhStatusEl();
  try{
    // 先取最新 sha
    const infoR=await fetch(`https://api.github.com/repos/${_ghRepo}/contents/${_ghPath}`,{
      headers:{"Authorization":"token "+_ghToken,"Accept":"application/vnd.github.v3+json"}
    });
    if(!infoR.ok) throw new Error("無法取得檔案資訊 HTTP "+infoR.status);
    const info=await infoR.json();
    _ghSha=info.sha;

    // 取原始 HTML 內容
    const rawR=await fetch(`https://raw.githubusercontent.com/${_ghRepo}/main/${_ghPath}?t=${Date.now()}`);
    let html=rawR.ok?await rawR.text():atob(info.content.replace(/\n/g,""));

    // 替換資料區塊
    const ms="/*DATA_START*/",me="/*DATA_END*/";
    const toSave={...state,_saved:true};
    const newData=`${ms}\nconst DEMO=${JSON.stringify(toSave,null,0)};\n${me}`;
    html=html.includes(ms)
      ?html.replace(/\/\*DATA_START\*\/[\s\S]*?\/\*DATA_END\*\//,newData)
      :html.replace(/const DEMO\s*=\s*\{[\s\S]*?\};\s*\n/,newData+"\n");

    // 推回 GitHub
    const putR=await fetch(`https://api.github.com/repos/${_ghRepo}/contents/${_ghPath}`,{
      method:"PUT",
      headers:{"Authorization":"token "+_ghToken,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},
      body:JSON.stringify({message:"update stock data "+new Date().toLocaleString('zh-TW'),content:btoa(unescape(encodeURIComponent(html))),sha:_ghSha})
    });
    if(!putR.ok){
      const err=await putR.json();
      throw new Error(err.message||"HTTP "+putR.status);
    }
    const result=await putR.json();
    _ghSha=result.content.sha;
    _ghStatus="✓ 已同步 GitHub "+new Date().toLocaleTimeString('zh-TW',{hour12:false});
  }catch(e){
    _ghStatus="⚠ GitHub 同步失敗："+e.message;
  }
  _ghSyncing=false;
  updateGhStatusEl();
}

function updateGhStatusEl(){
  const el=document.getElementById('gh-status');
  if(el){
    if(_ghStatus.startsWith('⏳')) el.textContent='同步中…';
    else if(_ghStatus.startsWith('✓')) el.textContent='已同步';
    else if(_ghStatus.startsWith('⚠')) el.textContent='同步失敗';
    else el.textContent='同步 GitHub';
    const btn=el.closest('button');
    if(btn) btn.title=_ghStatus;
  }
}

function saveGhSettings(){
  const t=(document.getElementById('gh-token-input').value||"").trim();
  const r=(document.getElementById('gh-repo-input').value||"").trim();
  const p=(document.getElementById('gh-path-input').value||"").trim();
  if(!t||!r||!p){alert("請填寫所有欄位");return;}
  _ghToken=t;_ghRepo=r;_ghPath=p;
  localStorage.setItem('gh_token',t);
  localStorage.setItem('gh_repo',r);
  localStorage.setItem('gh_path',p);
  _ghStatus="✓ 設定已儲存，下次更新資料時自動同步";
  modal=null;render();
  ghFetchSha();
}

function clearGhSettings(){
  if(!confirm("確定清除 GitHub 設定？")) return;
  _ghToken="";_ghRepo="";_ghPath="";_ghStatus="";
  localStorage.removeItem('gh_token');localStorage.removeItem('gh_repo');localStorage.removeItem('gh_path');
  render();
}

    return true;
  };
  // 買入：只算符合篩選的批次
  let buyQ=lots.filter(l=>l.type==="buy"&&match(l))
    .sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id)
    .map(l=>({...l,rem:l.shares,cpp:l.total/l.shares}));
  // 賣出：也只消耗符合篩選的賣出
  lots.filter(l=>l.type==="sell"&&match(l))
    .sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id)
    .forEach(sell=>{
      let left=sell.shares;
      for(let b of buyQ){if(!left)break;const take=Math.min(b.rem,left);b.rem-=take;left-=take;}
    });
  return buyQ.filter(b=>b.rem>0).map(b=>({...b,shares:b.rem}));
}

function totalShares(t,fb,fo){return getLots(t,fb,fo).reduce((a,l)=>a+l.shares,0);}
function totalCost(t,fb,fo){return getLots(t,fb,fo).reduce((a,l)=>a+l.cpp*l.shares,0);}
// 未實現損益 = 持股數 × 股價 × (1 - 手續費稅率) - 持股成本
function upnl(t,price,fb,fo){
  return getLots(t,fb,fo).reduce((a,l)=>a+(price*(1-FEE_RATE)-l.cpp)*l.shares,0);
}
function divTotal(t){return (state.stocks[t].dividends||[]).reduce((a,d)=>a+d.amount,0);}
function yld(ann,price){return price>0?((ann/price)*100).toFixed(2):"-";}
function fmt(n){return Math.round(n).toLocaleString('zh-TW');}
function fmtP(n){
  // 顯示股價：有小數就保留最多2位，整數就不顯示小數點
  if(n==null||isNaN(n)) return "--";
  return n%1===0?n.toLocaleString('zh-TW'):(Math.round(n*100)/100).toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function fmtS(n){return(n>=0?"+":"")+fmt(n);}

// 已實現損益（FIFO），可篩選 broker/operator
function calcRealizedPnl(ticker,filterBroker,filterOp){
  const s=state.stocks[ticker];
  const lots=s.lots||[];
  const match=l=>{
    if(filterBroker&&filterBroker!=="全部"&&l.broker!==filterBroker) return false;
    if(filterOp&&filterOp!=="全部"&&l.operator!==filterOp) return false;
    return true;
  };
  const buyQ=lots.filter(l=>l.type==="buy"&&match(l))
    .sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id)
    .map(l=>({...l,rem:l.shares,cpp:l.total/l.shares}));
  const records=[];
  let total=0;
  lots.filter(l=>l.type==="sell"&&match(l))
    .sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id)
    .forEach(sell=>{
      const spp=sell.total/sell.shares;
      let left=sell.shares,costSum=0;
      while(left>0&&buyQ.length>0){
        const b=buyQ[0];
        if(b.rem===0){buyQ.shift();continue;}
        const take=Math.min(b.rem,left);
        costSum+=take*b.cpp; b.rem-=take; left-=take;
        if(b.rem===0) buyQ.shift();
      }
      const matched=sell.shares-left;
      if(matched>0){
        const avgCost=costSum/matched;
        const pnl=(spp-avgCost)*matched;
        total+=pnl;
        records.push({sellDate:sell.date,sellShares:matched,sellPrice:spp,buyAvgCost:avgCost,pnl:Math.round(pnl),sellId:sell.id,sellIncome:sell.sellIncome??null});
      }
    });
  return {total:Math.round(total),records};
}

// 全部股票已實現損益（已依篩選）
function allRealizedPnl(fb,fo){
  const rows=[];let grandTotal=0;
  Object.keys(state.stocks).forEach(t=>{
    const {total,records}=calcRealizedPnl(t,fb,fo);
    if(records.length>0){
      const s=state.stocks[t];
      rows.push({ticker:t,name:s.name,total,records});
      grandTotal+=total;
    }
  });
  return{rows,grandTotal:Math.round(grandTotal)};
}

const IS_FILE_ORIGIN=location.protocol==="file:";

// ── 請將下方 YOUR_WORKER_URL 換成你自己的 Cloudflare Worker 網址 ──────────
// 範例：https://cors-proxy.yourname.workers.dev
// 部署方法：參見同目錄的 cors-worker.js
const MY_WORKER = "YOUR_WORKER_URL";
const hasWorker = MY_WORKER && !MY_WORKER.startsWith("YOUR_");

async function fetchWithProxy(url){
  const needsProxy = IS_FILE_ORIGIN || location.hostname.endsWith('github.io');

  // 依序嘗試的策略
  const strategies = [];

  // 1. 直接呼叫（localhost OK，GitHub Pages 必然失敗但無害）
  if (!needsProxy) strategies.push(() => url);

  // 2. 自架 Cloudflare Worker（最穩定，設定後優先使用）
  if (hasWorker) strategies.push(() => `${MY_WORKER}/?url=${encodeURIComponent(url)}`);

  // 3. 公共 proxy 備援（不穩定，僅當 Worker 未設定時使用）
  if (!hasWorker) {
    strategies.push(
      () => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      () => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
      () => `https://api.codetabs.com/v1/proxy?url=${encodeURIComponent(url)}`,
    );
  }

  let lastErr;
  for(const getUrl of strategies){
    const proxyUrl = getUrl();
    try{
      const res=await fetch(proxyUrl,{
        credentials:'omit',
        signal:AbortSignal.timeout(15000)
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const text=await res.text();
      if(!text||text.trim()==="") throw new Error("空回應");
      if(text.trim().startsWith("<")) throw new Error("非 JSON 回應");
      return JSON.parse(text);
    }catch(e){ lastErr=e; }
  }
  throw lastErr||new Error('所有方式均失敗');
}

// ── FinMind：上市 + 上櫃收盤價（有開 CORS，免 proxy）────────────────
// dataset: TaiwanStockPrice       → 上市
// dataset: TaiwanOTCPrice         → 上櫃
// 一次帶入多個 data_id 用逗號分隔（免費版單次 600 筆上限）
async function fetchFinMind(dataset, codes, date){
  const token=_tk();
  // FinMind 每次只帶一個 data_id，用 Promise.all 並行查
  const results = await Promise.allSettled(codes.map(async code=>{
    const url=`https://api.finmindtrade.com/api/v4/data?dataset=${dataset}&data_id=${encodeURIComponent(code)}&start_date=${date}&token=${token}`;
    const res=await fetch(url,{credentials:'omit',signal:AbortSignal.timeout(20000)});
    if(!res.ok) throw new Error(`FinMind HTTP ${res.status}`);
    const json=await res.json();
    if(json.status!==200) throw new Error(`FinMind ${json.msg||json.status}`);
    // 取最新一筆收盤價
    const rows=(json.data||[]);
    if(!rows.length) return null;
    const latest=rows.reduce((a,b)=>a.date>b.date?a:b);
    const price=parseFloat(latest.close);
    return isNaN(price)?null:{code,price};
  }));
  const map={};
  results.forEach(r=>{ if(r.status==='fulfilled'&&r.value) map[r.value.code]=r.value.price; });
  return map;
}

async function fetchPrices(onlyHolding=false){
  if(priceLoading)return;
  priceLoading=true;priceMsg="";render();
  const allTickers=Object.keys(state.stocks);
  // 只更新目前有持倉（持股數 > 0）的股票
  const tickers=onlyHolding
    ? allTickers.filter(t=>totalShares(t)>0)
    : allTickers;
  if(!tickers.length){priceLoading=false;priceMsg="尚無持股";render();return;}

  const map={};
  const yieldMap={};
  const perMap={};
  const errors=[];
  const dateStr=new Date(Date.now()-4*86400000).toISOString().slice(0,10);

  // ── 1. 上市收盤價：www.twse.com.tw（有開 CORS *）────────────────
  // 欄位順序：[0]代號 [1]名稱 [2]成交股數 [3]成交金額 [4]開盤 [5]最高 [6]最低 [7]收盤 ...
  let twseOk=false;
  try{
    const d=await fetch("https://www.twse.com.tw/rwd/zh/afterTrading/STOCK_DAY_ALL?response=json",
      {credentials:'omit',signal:AbortSignal.timeout(12000)}).then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); });
    if(d.stat==="OK"&&Array.isArray(d.data)&&d.data.length){
      d.data.forEach(row=>{
        const code=(row[0]||"").trim();
        const close=parseFloat((row[7]||"").replace(/,/g,""));
        if(code&&!isNaN(close)) map[code]=close;
      });
      twseOk=true;
    }
  }catch(e){ errors.push("TWSE上市查詢失敗"); }

  // ── 2. 上市殖利率（openapi.twse.com.tw，失敗靜默跳過）──────────────
  try{
    const d=await fetch("https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL",
      {credentials:'omit',signal:AbortSignal.timeout(12000)}).then(r=>r.json());
    if(Array.isArray(d)) d.forEach(row=>{
      const code=(row.Code||"").trim();
      const y=parseFloat((row.DividendYield||"").replace(/,/g,""));
      if(code&&!isNaN(y)&&y>0) yieldMap[code]=y;
      const pe=parseFloat((row.PEratio||"").replace(/,/g,""));
      if(code&&!isNaN(pe)&&pe>0) perMap[code]=pe;
    });
  }catch(e){}

  // ── 3. 個股在 TWSE 找不到 → 依序用 FinMind 補查 ────────────────
  // 策略：每支股票在 TWSE 找不到 → 先試上市資料集，再試上櫃資料集
  let finmindCount=0;

  // 找出在 TWSE 找不到價格的股票
  const missingFromTWSE=tickers.filter(t=>map[t]==null);

  if(missingFromTWSE.length){
    // 3a. 先用 FinMind TaiwanStockPrice（上市）補
    try{
      const prices=await fetchFinMind("TaiwanStockPrice", missingFromTWSE, dateStr);
      Object.assign(map, prices);
      const found=Object.keys(prices).length;
      if(found) finmindCount+=found;
    }catch(e){ errors.push("FinMind上市:"+e.message); }

    // 3b. FinMind 上市也找不到 → 再用 TaiwanOTCPrice（上櫃）補
    const stillMissingOTC=missingFromTWSE.filter(t=>map[t]==null);
    if(stillMissingOTC.length){
      try{
        const prices=await fetchFinMind("TaiwanOTCPrice", stillMissingOTC, dateStr);
        Object.assign(map, prices);
        const found=Object.keys(prices).length;
        if(found) finmindCount+=found;
      }catch(e){ errors.push("FinMind上櫃:"+e.message); }
    }
  }

  // ── 4. 寫入 state ─────────────────────────────────────────────────
  let updated=0,yieldUpdated=0,notFound=[];
  tickers.forEach(t=>{
    if(map[t]!=null){
      const price=map[t];
      state.stocks[t].currentPrice=price;
      state.stocks[t].priceUpdated=new Date().toLocaleString('zh-TW',{hour12:false});
      updated++;
      if(yieldMap[t]&&price>0){
        state.stocks[t].annualDividend=Math.round(yieldMap[t]*price)/100;
        yieldUpdated++;
      }
      if(perMap[t]) state.stocks[t].per=parseFloat(perMap[t].toFixed(2));
    }else notFound.push(t);
  });

  if(updated>0||yieldUpdated>0) save();

  if(updated===0&&errors.length){
    priceMsg="更新失敗："+errors.join("；");
  } else {
    priceMsg=`已更新 ${updated} 檔收盤價`+(yieldUpdated?`、${yieldUpdated} 檔殖利率`:"")
      +(finmindCount?`（其中 ${finmindCount} 檔 TWSE 找不到，改用 FinMind）`:"")
      +(notFound.length?`，找不到：${notFound.join("、")}`:"")
      +(errors.length?`（部分錯誤：${errors.join("；")}）`:"");
  }
  priceLoading=false;render();
}

async function getStockList(){
  if(_stockListCache&&_stockListCache.length>10) return _stockListCache;
  const list=[];
  const seen=new Set();
  const add=(code,name)=>{code=(code||"").trim();name=(name||"").trim();if(code&&name&&!seen.has(code)){seen.add(code);list.push({code,name});}};

  // 上市
  try{
    const res=await fetch("https://www.twse.com.tw/rwd/zh/afterTrading/STOCK_DAY_ALL?response=json",{credentials:'omit',signal:AbortSignal.timeout(10000)});
    const data=await res.json();
    if(data&&data.data) data.data.forEach(r=>add(r[0],r[1]));
  }catch(e){}

  // 上櫃
  try{
    const r2=await fetch("https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes",{credentials:'omit',signal:AbortSignal.timeout(10000)});
    const d2=await r2.json();
    if(Array.isArray(d2)) d2.forEach(r=>add(r.SecuritiesCompanyCode,r.CompanyName));
  }catch(e){}

  // 已持有的補入（確保搜尋得到）
  Object.entries(state.stocks||{}).forEach(([code,s])=>add(code,s.name));

  _stockListCache=list;
  return list;
}
function filterStocks(list,q){
  if(!q||q.length<1) return[];
  const lq=q.toLowerCase();
  const exact=[],start=[],contain=[];
  list.forEach(s=>{
    if(s.code===q) exact.push(s);
    else if(s.code.startsWith(q)) start.push(s);
    else if(s.name.toLowerCase().includes(lq)) contain.push(s);
  });
  return [...exact,...start,...contain].slice(0,10);
}

  } else if(modal==="add-tx"){

  } else if(modal&&modal.startsWith("edit-tx:")){

          <div class="form-row" style="flex:1"><label>券商</label><select id="m-br">${bOpts}</select></div>
          <div class="form-row" style="flex:1"><label>操作人</label><select id="m-op">${oOpts}</select></div>

        </div>
      </div></div>`;

  } else if(modal==="add-div"){
    mHtml=`<div class="overlay" onclick="cM(event)"><div class="modal" onclick="event.stopPropagation()">
      <h3>新增股利 — ${state.stocks[sel].name}</h3>
      <div class="form-row"><label>日期</label>${smartDateHtml('m-date',today())}</div>

  } else if(modal==="edit-stock"){
    const s=state.stocks[sel];
    mHtml=`<div class="overlay" onclick="cM(event)"><div class="modal" onclick="event.stopPropagation()">
      <h3>設定 — ${s.name}</h3>

  } else if(modal==="manage-settings"){
    const brItems=brokers.map((b,i)=>`<div class="broker-item">${b}
      <button class="btn btn-sm" onclick="deleteBroker(${i})" style="padding:2px 6px"><i class="ti ti-x"></i></button></div>`).join("");
    const opItems=operators.map((o,i)=>`<div class="broker-item">${o}
      <button class="btn btn-sm" onclick="deleteOperator(${i})" style="padding:2px 6px"><i class="ti ti-x"></i></button></div>`).join("");
    mHtml=`<div class="overlay" onclick="cM(event)"><div class="modal" onclick="event.stopPropagation()">
      <h3><i class="ti ti-settings"></i> 管理設定</h3>
      <div style="font-size:13px;font-weight:500;margin-bottom:6px"><i class="ti ti-building-bank"></i> 券商</div>
      <div class="broker-list">${brItems||'<span style="color:var(--text3);font-size:13px">尚無券商</span>'}</div>
      <div class="form-row" style="margin-top:10px"><label>新增券商</label>
        <div style="display:flex;gap:8px"><input id="m-br-new" placeholder="例：玉山"/>

      <div style="font-size:13px;font-weight:500;margin:14px 0 6px"><i class="ti ti-user"></i> 操作人</div>
      <div class="broker-list">${opItems||'<span style="color:var(--text3);font-size:13px">尚無操作人</span>'}</div>
      <div class="form-row" style="margin-top:10px"><label>新增操作人</label>
        <div style="display:flex;gap:8px"><input id="m-op-new" placeholder="例：小明"/>
          <button class="btn btn-primary btn-sm" onclick="doAddOperator()">新增</button></div></div>
      <div class="modal-section">
        <div class="modal-section-title"><i class="ti ti-link"></i> 本機檔案・自動存回</div>
        ${FS_SUPPORTED
          ?(_fileHandle
            ?`<div style="font-size:12px;color:var(--success-t);background:var(--success-bg);border:.5px solid var(--success-bd);border-radius:var(--r);padding:8px 12px;margin-bottom:8px">✓ 已連結本機檔案</div>
               <div style="font-size:12px;color:var(--text2)">${_saveStatus||''}</div>`
            :`<div style="font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.6">連結本機 HTML 檔案後，每次更新資料會自動寫回檔案。</div>
               <button class="btn btn-sm" onclick="requestFileAccess()" style="border-color:var(--warn-bd);background:var(--warn-bg);color:var(--warn-t)"><i class="ti ti-link"></i> 連結檔案・自動存回</button>`)
          :`<div style="font-size:12px;color:var(--text3)">請用 Chrome 或 Edge 開啟此功能。</div>`}
      </div>
      <div class="modal-section">
        <div class="modal-section-title"><i class="ti ti-brand-github"></i> GitHub 自動同步</div>
        ${_ghToken?`
        <div style="font-size:12px;color:var(--success-t);background:var(--success-bg);border:.5px solid var(--success-bd);border-radius:var(--r);padding:8px 12px;margin-bottom:10px">
          ✓ 已設定：${_ghRepo} / ${_ghPath}

        <div style="display:flex;gap:8px;flex-wrap:wrap">

          <button class="btn btn-sm btn-danger" onclick="clearGhSettings()"><i class="ti ti-trash"></i> 清除設定</button>
        </div>`:`
        <div style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6">
          設定後，每次新增/修改資料都會自動存回 GitHub，任何裝置打開網址都是最新資料。
        </div>
        <div class="form-row"><label>Personal Access Token</label>
          <input id="gh-token-input" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off"/>
          <div class="hint-text">GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)，勾選 <strong>repo</strong> 權限</div>
        </div>
        <div class="form-row"><label>Repository（帳號/repo名稱）</label>
          <input id="gh-repo-input" placeholder="例：minnieeinnim/StockTracker"/>
        </div>
        <div class="form-row"><label>檔案路徑</label>
          <input id="gh-path-input" placeholder="例：index.html"/>
        </div>
        <button class="btn btn-primary btn-sm" onclick="saveGhSettings()"><i class="ti ti-check"></i> 儲存 GitHub 設定</button>`}
      </div>
      <div class="modal-btns"><button class="btn btn-primary" onclick="cM()">完成</button></div>
    </div></div>`;
  }

  // ── LIST VIEW ──────────────────────────────────────────
  if(view==="list"){
    const tickers=Object.keys(state.stocks);
    const fb=brokerFilter;
    const fo=operatorFilter;

    // 篩選：只要該 ticker 下有至少一筆 lot 符合篩選條件就顯示
    const sq=stockSearch.trim().toLowerCase();
    const filtered=tickers.filter(t=>{
      const s=state.stocks[t];
      if(sq&&!t.toLowerCase().includes(sq)&&!s.name.toLowerCase().includes(sq)) return false;
      const lots=s.lots||[];
      return lots.some(l=>{
        if(fb!=="全部"&&l.broker!==fb) return false;
        if(fo!=="全部"&&l.operator!==fo) return false;
        return true;
      });
    });

    const lastUpdated=tickers.length
      ?Object.values(state.stocks).map(s=>s.priceUpdated||"").filter(Boolean).sort().pop():"";

    const sqEsc=stockSearch.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    const filterHtml=`<div class="filter-section">
      <div class="filter-row" style="margin-bottom:6px">
        <span class="filter-label"><i class="ti ti-search" style="font-size:13px"></i></span>
        <div style="position:relative;flex:1;max-width:260px">
          <input value="${sqEsc}" placeholder="搜尋股票代號或名稱…"
            oninput="setStockSearch(this.value)"
            style="width:100%;padding:5px 28px 5px 10px;border-radius:999px;border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit"/>
          ${stockSearch?`<span onclick="setStockSearch('')" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);font-size:14px;line-height:1">✕</span>`:""}
        </div>
        ${sq?`<span style="font-size:12px;color:var(--text2)">找到 ${filtered.length} 檔</span>`:""}
      </div>
      <div class="filter-row">
        <span class="filter-label">券商</span>
        ${allBr.map(b=>`<span class="chip${fb===b?" active":""}" onclick="setBroker('${b}')">${b}</span>`).join("")}
      </div>
      <div class="filter-row" style="margin-top:6px">
        <span class="filter-label">操作人</span>
        ${allOp.map(o=>`<span class="chip${fo===o?" active":""}" onclick="setOperator('${o}')">${o}</span>`).join("")}
      </div>
    </div>`;

    const priceBar=`<div class="pricebar">
      <span class="hint"><i class="ti ti-clock"></i> 收盤價${lastUpdated?"　最後更新："+lastUpdated:"　尚未更新"}</span>
      ${priceLoading
        ?`<span class="spin"></span><span style="font-size:12px;color:var(--text2)">更新中…</span>`
        :`<button class="btn btn-sm btn-primary" onclick="fetchPrices(false)" title="更新所有股票（含已全出清）"><i class="ti ti-refresh"></i> 更新全部</button>
        <button class="btn btn-sm" onclick="fetchPrices(true)" title="只更新目前有持倉的股票"><i class="ti ti-refresh"></i> 更新持倉</button>
        <button class="btn btn-sm" onclick="fetchFundamentals()" title="從 FinMind 抓全市場本益比" style="border-color:var(--info-bd);color:var(--info-t)">${fundamentalsLoading?'<span class="spin"></span> 抓取中…':`<i class="ti ti-trending-up"></i> 更新本益比`}</button>`}

      ${priceMsg?`<span class="price-status">${priceMsg}</span>`:""}
      ${fundamentalsMsg?`<span class="price-status" style="color:var(--info-t)">${fundamentalsMsg}</span>`:""}
    </div>`;

    const cards=filtered.length===0
      ?`<div class="empty"><i class="ti ti-package-off" style="font-size:32px;display:block;margin-bottom:8px"></i>${tickers.length?"此篩選條件無持股":"尚無持股，點擊「新增股票」開始"}</div>`
      :filtered.slice().sort((a,b)=>{
          const sharesA=totalShares(a,fb,fo);
          const sharesB=totalShares(b,fb,fo);
          if((sharesA>0)===(sharesB>0)) return 0;
          return sharesA>0?-1:1;
        }).map(t=>{
          const s=state.stocks[t];
          const price=s.currentPrice||0;
          const y=yld(s.annualDividend,price);

          // 篩選後的彙總
          const shares=totalShares(t,fb,fo);
          const hasHolding=shares>0;
          const cost=totalCost(t,fb,fo);
          const pnl=upnl(t,price,fb,fo);
          const rpnl=calcRealizedPnl(t,fb,fo).total;
          const pc=pnl>0?"gain":pnl<0?"loss":"";
          const rpc=rpnl>0?"gain":rpnl<0?"loss":"";

          // 判斷是否多券商或多操作人（篩選後）
          const tBr=tickerBrokers(t).filter(b=>fb==="全部"||b===fb);
          const tOp=tickerOperators(t).filter(o=>fo==="全部"||o===fo);
          const isMulti=(tBr.length>1||tOp.length>1)&&(fb==="全部"||fo==="全部");

          // 如果全部模式且有多個 broker/op 組合，顯示細分
          let subRows="";
          if(fb==="全部"&&fo==="全部"&&(tBr.length>1||tOp.length>1)){
            // 所有 broker+op 組合
            const combos=[...new Set((s.lots||[]).filter(l=>l.type==="buy").map(l=>`${l.broker||""}|||${l.operator||""}`))];
            subRows=combos.map(combo=>{
              const[br,op]=combo.split("|||");
              const cs=totalShares(t,br,op);
              if(!cs) return"";
              const cc=totalCost(t,br,op);
              const cpnl=upnl(t,price,br,op);
              const crpnl=calcRealizedPnl(t,br,op).total;
              const cpc=cpnl>0?"gain":cpnl<0?"loss":"";
              const crpc=crpnl>0?"gain":crpnl<0?"loss":"";
              return `<div class="sub-row">
                <div class="sub-label"><span class="badge badge-broker">${br||"--"}</span> <span class="badge badge-op"><i class="ti ti-user" style="font-size:10px"></i> ${op||"--"}</span></div>
                <span style="color:var(--text2)">${fmt(cs)} 股</span>
                <span style="color:var(--text2)">${fmt(Math.round(cc))} 元</span>
                <span class="${cpc}" style="font-weight:500">${price?fmtS(Math.round(cpnl)):"--"}</span>
                <span class="${crpc}" style="font-weight:500;font-size:11px">${crpnl!==0?fmtS(crpnl)+" 元":""}</span>
              </div>`;
            }).join("");
          }

          return `<div class="stock-card${hasHolding?'':" stock-card-empty"}" onclick="openDetail('${t}')"${hasHolding?'':' style="opacity:0.6;background:var(--surface2)"'}>
            <div class="card-top">
              <div>
                <span class="ticker">${s.name}</span>
                <span style="font-size:12px;color:var(--text2)"> ${t}</span>
                ${isMulti?`<span class="badge badge-multi">多帳戶</span>`:""}
              </div>
              <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
                ${tBr.length===1?`<span class="badge badge-broker">${tBr[0]}</span>`:""}
                ${tOp.length===1?`<span class="badge badge-op"><i class="ti ti-user" style="font-size:10px"></i> ${tOp[0]}</span>`:""}
              </div>
            </div>
            <div style="display:flex;gap:5px;flex-wrap:wrap">
              ${s.annualDividend?`<span class="yield-badge"><i class="ti ti-chart-pie"></i> 殖利率 ${y}%</span>`:""}
              ${s.per?`<span class="yield-badge" style="background:var(--info-bg);color:var(--info-t)"><i class="ti ti-trending-up"></i> 本益比 ${s.per}x</span>`:""}
            </div>
            <div class="card-stats">
              <div class="stat">持股數<span>${fmt(shares)} 股</span></div>
              <div class="stat">收盤價<span>${price?fmtP(price)+" 元":"尚未更新"}</span></div>
              <div class="stat">持股成本<span>${fmt(Math.round(cost))} 元</span></div>
              <div class="stat">成本均價<span>${shares>0?fmtP(cost/shares)+" 元":"--"}</span></div>
              <div class="stat">未實現損益<span class="${pc}">${price?fmtS(Math.round(pnl))+" 元":"--"}</span></div>
              <div class="stat" style="grid-column:1/-1">已實現損益<span class="${rpc}" style="font-size:13px">${rpnl!==0||calcRealizedPnl(t,fb,fo).records.length>0?fmtS(rpnl)+" 元":"尚無賣出"}</span></div>
            </div>
            ${subRows}
          </div>`;
        }).join("");

    const ghSyncBtn=_ghToken
      ?`<button class="btn btn-sm" onclick="writeToGitHub()" style="border-color:var(--info-bd);background:var(--info-bg);color:var(--info-t)" title="${_ghStatus}"><i class="ti ti-cloud-upload"></i> <span id="gh-status">${_ghStatus&&_ghStatus.startsWith('✓')?'已同步':_ghStatus&&_ghStatus.startsWith('⚠')?'同步失敗':'同步 GitHub'}</span></button>`
      :'';

    app.innerHTML=`
      <div class="topbar">
        <h1><i class="ti ti-briefcase"></i> 我的持股</h1>
        ${ghSyncBtn}
        <button class="btn btn-sm" onclick="goUnrealized()"><i class="ti ti-trending-up"></i> 未實現損益</button>
        <button class="btn btn-sm" onclick="goRealized()"><i class="ti ti-chart-bar"></i> 已實現損益</button>
        <button class="btn btn-sm" onclick="exportExcel()"><i class="ti ti-download"></i> 匯出 Excel</button>
        <button class="btn btn-sm" onclick="oM('manage-settings')"><i class="ti ti-settings"></i> 設定</button>
        <button class="btn btn-primary btn-sm" onclick="oM('add-stock')"><i class="ti ti-plus"></i> 新增股票</button>
      </div>
      ${filterHtml}
      ${priceBar}
      <div class="stock-grid">${cards}</div>
      ${mHtml}`;
    if(modal==="add-stock") bindSearchModal();
    // 搜尋框 focus 保留
    if(stockSearch){const el=document.querySelector('[oninput="setStockSearch(this.value)"]');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}
    return;
  }

  // ── UNREALIZED VIEW ─────────────────────────────────────
  if(view==="unrealized"){
    const fb=brokerFilter,fo=operatorFilter;
    // 計算所有有持股的股票未實現損益
    const rows=[];
    let grandTotal=0,grandCost=0,grandMktVal=0;
    Object.keys(state.stocks).forEach(t=>{
      const s=state.stocks[t];
      const price=s.currentPrice||0;
      const sh=totalShares(t,fb,fo);
      if(sh<=0) return;
      const cost=totalCost(t,fb,fo);
      const pnl=upnl(t,price,fb,fo);
      const mktVal=sh*price*(1-FEE_RATE);
      const pct=cost>0?(pnl/cost*100):0;
      rows.push({ticker:t,name:s.name,shares:sh,cost,price,pnl:Math.round(pnl),pct,mktVal:Math.round(mktVal)});
      grandTotal+=pnl;grandCost+=cost;grandMktVal+=mktVal;
    });
    rows.sort((a,b)=>b.pnl-a.pnl);
    const gtc=grandTotal>0?"gain":grandTotal<0?"loss":"";
    const grandPct=grandCost>0?(grandTotal/grandCost*100):0;
    const filterHtml=`<div class="filter-section">
      <div class="filter-row">
        <span class="filter-label">券商</span>
        ${allBr.map(b=>`<span class="chip${fb===b?" active":""}" onclick="setBroker('${b}')">${b}</span>`).join("")}
      </div>
      <div class="filter-row" style="margin-top:6px">
        <span class="filter-label">操作人</span>
        ${allOp.map(o=>`<span class="chip${fo===o?" active":""}" onclick="setOperator('${o}')">${o}</span>`).join("")}
      </div>
    </div>`;
    const tableRows=rows.length===0
      ?`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text3)">此篩選條件下無持股</td></tr>`
      :rows.map(r=>{
          const rc=r.pnl>0?"gain":r.pnl<0?"loss":"";
          const pctStr=r.cost>0?` (${r.pct>=0?"+":""}${r.pct.toFixed(2)}%)`:"";
          return `<tr style="cursor:pointer" onclick="openDetail('${r.ticker}')">
            <td><strong>${r.name}</strong> <span style="color:var(--text2);font-size:12px">${r.ticker}</span></td>
            <td>${fmt(r.shares)} 股</td>
            <td>${fmt(Math.round(r.cost))} 元</td>
            <td>${r.price?fmt(r.price)+" 元":`<span style="color:var(--text3)">未更新</span>`}</td>
            <td>${r.price?fmt(r.mktVal)+" 元":"--"}</td>
            <td class="${rc}" style="font-weight:600">${r.price?fmtS(r.pnl)+" 元"+pctStr:"--"}</td>
          </tr>`;
        }).join("");
    app.innerHTML=`
      <div class="topbar">
        <button class="btn btn-sm" onclick="backList()"><i class="ti ti-arrow-left"></i> 返回</button>
        <h1><i class="ti ti-trending-up"></i> 未實現損益</h1>
      </div>
      ${filterHtml}
      <div class="sc-row">
        <div class="sc"><div class="sc-label">持股總成本</div><div class="sc-val">${fmt(Math.round(grandCost))} 元</div></div>
        <div class="sc"><div class="sc-label">持股總市值</div><div class="sc-val">${fmt(Math.round(grandMktVal))} 元</div></div>
        <div class="sc"><div class="sc-label">未實現損益合計</div><div class="sc-val ${gtc}">${fmtS(Math.round(grandTotal))} 元</div></div>
        <div class="sc"><div class="sc-label">整體損益率</div><div class="sc-val ${gtc}">${grandCost>0?(grandPct>=0?"+":"")+grandPct.toFixed(2)+"%":"--"}</div></div>
      </div>
      <div class="panel">
        <table><thead><tr><th>股票</th><th>持股數</th><th>持股成本</th><th>收盤價</th><th>市值（扣費後）</th><th>未實現損益</th></tr></thead>
        <tbody>${tableRows}</tbody>
        ${rows.length?`<tfoot><tr class="sum-row">
          <td colspan="2">合計 ${rows.length} 檔</td>
          <td>${fmt(Math.round(grandCost))} 元</td>
          <td>--</td>
          <td>${fmt(Math.round(grandMktVal))} 元</td>
          <td class="${gtc}">${fmtS(Math.round(grandTotal))} 元 ${grandCost>0?"("+(grandPct>=0?"+":"")+grandPct.toFixed(2)+"%)":""}</td>
        </tr></tfoot>`:""}
        </table>
      </div>`;
    return;
  }

  // ── REALIZED VIEW ───────────────────────────────────────
  if(view==="realized"){
    const fb=brokerFilter,fo=operatorFilter;
    const {rows,grandTotal}=allRealizedPnl(fb,fo);

    // 收集所有有賣出記錄的年份
    const allYears=[...new Set(
      rows.flatMap(r=>r.records.map(rec=>rec.sellDate.slice(0,4)))
    )].sort((a,b)=>b-a);

    const fy=realizedYearFilter;
    const vm=realizedViewMode; // "group" | "date"
    const ds=realizedDateSort; // "asc" | "desc"

    // 依年份篩選 records
    const filteredRows=rows.map(r=>({
      ...r,
      records: fy==="全部"?r.records:r.records.filter(rec=>rec.sellDate.startsWith(fy))
    })).filter(r=>r.records.length>0);
    const filteredTotal=filteredRows.reduce((a,r)=>a+r.records.reduce((b,rec)=>b+rec.pnl,0),0);
    const ftc=filteredTotal>0?"gain":filteredTotal<0?"loss":"";
    const gtc=grandTotal>0?"gain":grandTotal<0?"loss":"";

    // 展平所有交易記錄（用於日期排序模式）
    const flatRecords=[];
    filteredRows.forEach(r=>{
      r.records.forEach(rec=>{
        flatRecords.push({...rec,name:r.name,ticker:r.ticker});
      });
    });
    flatRecords.sort((a,b)=>{
      const cmp=a.sellDate.localeCompare(b.sellDate);
      return ds==='asc'?cmp:-cmp;
    });

    let tableRows="";
    if(filteredRows.length===0){
      tableRows=`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text3)">此篩選條件下無賣出記錄</td></tr>`;
    } else if(vm==="date"){
      // ── 日期排序展平模式 ───────────────────────────────
      tableRows=flatRecords.map(rec=>{
        const dc=rec.pnl>0?"gain":rec.pnl<0?"loss":"";
        return `<tr style="cursor:pointer" onclick="openDetail('${rec.ticker}')">
          <td><span style="font-weight:500">${rec.sellDate}</span></td>
          <td><strong>${rec.name}</strong> <span style="color:var(--text2);font-size:11px">${rec.ticker}</span></td>
          <td>${fmt(rec.sellShares)} 股</td>
          <td>${fmtP(rec.sellPrice)} 元</td>
          <td>${fmtP(rec.buyAvgCost)} 元</td>
          <td class="${dc}" style="font-weight:600">${fmtS(rec.pnl)} 元</td>
        </tr>`;
      }).join("");
    } else if(fy!=="全部"){
      // 單一年份：直接顯示各股票
      tableRows=filteredRows.map(r=>{
        const rc=r.records.reduce((a,rec)=>a+rec.pnl,0);
        const rcc=rc>0?"gain":rc<0?"loss":"";
        const detail=r.records.map(rec=>{
          const dc=rec.pnl>0?"gain":rec.pnl<0?"loss":"";
          return `<tr style="background:var(--surface2);font-size:12px">
            <td style="padding-left:28px;color:var(--text2)">${rec.sellDate}</td>
            <td style="color:var(--text2)">${fmt(rec.sellShares)} 股</td>
            <td style="color:var(--text2)">${fmtP(rec.sellPrice)} 元</td>
            <td style="color:var(--text2)">${fmtP(rec.buyAvgCost)} 元</td>
            <td class="${dc}">${fmtS(rec.pnl)} 元</td>
            <td><input type="number" step="any" placeholder="輸入" value="${rec.sellIncome??''}"
              style="width:100px;padding:3px 7px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px"
              onclick="event.stopPropagation()"
              onchange="saveSellIncome(${rec.sellId},this.value,'${r.ticker}')"/> 元</td>
          </tr>`;
        }).join("");
        return `<tr style="cursor:pointer" onclick="openDetail('${r.ticker}')">
          <td><strong>${r.name}</strong> <span style="color:var(--text2);font-size:12px">${r.ticker}</span></td>
          <td colspan="3" class="${rcc}" style="font-weight:600">${fmtS(Math.round(rc))} 元</td>
          <td style="color:var(--text3);font-size:12px">${r.records.length} 筆</td>
          <td></td>
        </tr>${detail}`;
      }).join("");
    } else {
      // 全部年份：依年份分組
      const byYear={};
      filteredRows.forEach(r=>{
        r.records.forEach(rec=>{
          const yr=rec.sellDate.slice(0,4);
          if(!byYear[yr]) byYear[yr]={total:0,rows:{}};
          if(!byYear[yr].rows[r.ticker]) byYear[yr].rows[r.ticker]={name:r.name,ticker:r.ticker,records:[]};
          byYear[yr].rows[r.ticker].records.push(rec);
          byYear[yr].total+=rec.pnl;
        });
      });
      const years=Object.keys(byYear).sort((a,b)=>b-a);
      tableRows=years.map(yr=>{
        const ydata=byYear[yr];
        const ytc=ydata.total>0?"gain":ydata.total<0?"loss":"";
        const stockRows=Object.values(ydata.rows).map(r=>{
          const rc=r.records.reduce((a,rec)=>a+rec.pnl,0);
          const rcc=rc>0?"gain":rc<0?"loss":"";
          const detail=r.records.map(rec=>{
            const dc=rec.pnl>0?"gain":rec.pnl<0?"loss":"";
            return `<tr style="background:var(--surface2);font-size:12px">
              <td style="padding-left:28px;color:var(--text2)">${rec.sellDate}</td>
              <td style="color:var(--text2)">${fmt(rec.sellShares)} 股</td>
              <td style="color:var(--text2)">${fmtP(rec.sellPrice)} 元</td>
              <td style="color:var(--text2)">${fmtP(rec.buyAvgCost)} 元</td>
              <td class="${dc}">${fmtS(rec.pnl)} 元</td>
              <td><input type="number" step="any" placeholder="輸入" value="${rec.sellIncome??''}"
                style="width:100px;padding:3px 7px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px"
                onclick="event.stopPropagation()"
                onchange="saveSellIncome(${rec.sellId},this.value,'${r.ticker}')"/> 元</td>
            </tr>`;
          }).join("");
          return `<tr style="cursor:pointer" onclick="openDetail('${r.ticker}')">
            <td><strong>${r.name}</strong> <span style="color:var(--text2);font-size:12px">${r.ticker}</span></td>
            <td colspan="3" class="${rcc}" style="font-weight:600">${fmtS(Math.round(rc))} 元</td>
            <td style="color:var(--text3);font-size:12px">${r.records.length} 筆</td>
            <td></td>
          </tr>${detail}`;
        }).join("");
        return `<tr class="group-header"><td colspan="6" style="cursor:pointer" onclick="setRealizedYear('${yr}')">
          <i class="ti ti-calendar" style="font-size:12px"></i> ${yr} 年
          <span class="${ytc}" style="margin-left:12px;font-size:13px">${fmtS(Math.round(ydata.total))} 元</span>
          <span style="color:var(--text3);font-size:11px;margin-left:8px">點擊只看此年 →</span>
        </td></tr>${stockRows}`;
      }).join("");
    }

    // 日期排序模式的表頭
    const tableHead=vm==="date"
      ?`<tr>
          <th class="sortable ${ds==='desc'?'sort-desc':'sort-asc'}" onclick="toggleRealizedDateSort()" style="cursor:pointer;user-select:none">
            賣出日期<span class="sort-icon"></span></th>
          <th>股票</th><th>股數</th><th>賣出均價</th><th>買入均成本</th><th>已實現損益</th>
        </tr>`
      :`<tr><th>股票</th><th>賣出均價</th><th>買入均成本</th><th>已實現損益</th><th>筆數</th><th>手動總收益</th></tr>`;

    const filterHtml=`<div class="filter-section">
      <div class="filter-row">
        <span class="filter-label">券商</span>
        ${allBr.map(b=>`<span class="chip${fb===b?" active":""}" onclick="setBroker('${b}')">${b}</span>`).join("")}
      </div>
      <div class="filter-row" style="margin-top:6px">
        <span class="filter-label">操作人</span>
        ${allOp.map(o=>`<span class="chip${fo===o?" active":""}" onclick="setOperator('${o}')">${o}</span>`).join("")}
      </div>
      ${allYears.length>0?`<div class="filter-row" style="margin-top:6px">
        <span class="filter-label">年份</span>
        ${["全部",...allYears].map(y=>`<span class="chip${fy===y?" active":""}" onclick="setRealizedYear('${y}')">${y==="全部"?"全部":y+" 年"}</span>`).join("")}
      </div>`:""}
      <div class="filter-row" style="margin-top:6px">
        <span class="filter-label">顯示</span>
        <span class="chip${vm==="group"?" active":""}" onclick="setRealizedViewMode('group')"><i class="ti ti-layout-list" style="font-size:11px"></i> 按股票分組</span>
        <span class="chip${vm==="date"?" active":""}" onclick="setRealizedViewMode('date')"><i class="ti ti-calendar-event" style="font-size:11px"></i> 按日期排序</span>
        ${vm==="date"?`<span class="chip" onclick="toggleRealizedDateSort()" style="font-size:11px">
          ${ds==='desc'?'▼ 新→舊':'▲ 舊→新'}</span>`:""}
      </div>
    </div>`;

    // 摘要：顯示篩選年份的合計 vs 全部合計
    const scRow=fy==="全部"
      ?`<div class="sc-row">
          <div class="sc"><div class="sc-label">已實現損益合計（全部）</div><div class="sc-val ${gtc}">${fmtS(grandTotal)} 元</div></div>
          <div class="sc"><div class="sc-label">有賣出記錄的股票數</div><div class="sc-val">${rows.length} 檔</div></div>
          <div class="sc"><div class="sc-label">賣出筆數合計</div><div class="sc-val">${flatRecords.length} 筆</div></div>
        </div>`
      :`<div class="sc-row">
          <div class="sc"><div class="sc-label">${fy} 年已實現損益</div><div class="sc-val ${ftc}">${fmtS(Math.round(filteredTotal))} 元</div></div>
          <div class="sc"><div class="sc-label">全部年份合計</div><div class="sc-val ${gtc}" style="font-size:15px">${fmtS(grandTotal)} 元</div></div>
          <div class="sc"><div class="sc-label">${fy} 年有賣出的股票</div><div class="sc-val">${filteredRows.length} 檔</div></div>
          <div class="sc"><div class="sc-label">${fy} 年賣出筆數</div><div class="sc-val">${flatRecords.length} 筆</div></div>
        </div>`;

    app.innerHTML=`
      <div class="topbar">
        <button class="btn btn-sm" onclick="backList()"><i class="ti ti-arrow-left"></i> 返回</button>
        <h1><i class="ti ti-chart-bar"></i> 已實現損益${fy!=="全部"?` — ${fy} 年`:""}</h1>
      </div>
      ${filterHtml}
      ${scRow}
      <div class="panel">
        <table><thead>${tableHead}</thead>
        <tbody>${tableRows}</tbody>
        ${filteredRows.length?`<tfoot><tr class="sum-row"><td colspan="${vm==="date"?5:3}">合計 ${flatRecords.length} 筆${fy!=="全部"?" ("+fy+" 年)":""}</td><td class="${ftc}">${fmtS(Math.round(filteredTotal))} 元</td>${vm==="date"?"":"<td colspan='2'></td>"}</tr></tfoot>`:""}
        </table>
      </div>`;
    return;
  }

  // ── DETAIL VIEW ─────────────────────────────────────────
  const s=state.stocks[sel];
  const price=s.currentPrice||0;
  const fb=brokerFilter,fo=operatorFilter;
  const lots=getLots(sel,fb,fo);
  const shares=totalShares(sel,fb,fo);
  const cost=totalCost(sel,fb,fo);
  const pnl=upnl(sel,price,fb,fo);
  const pc=pnl>0?"gain":pnl<0?"loss":"";
  const dt=divTotal(sel);
  const y=yld(s.annualDividend,price);
  const {total:rpnl,records:rpnlRec}=calcRealizedPnl(sel,fb,fo);
  const rpc=rpnl>0?"gain":rpnl<0?"loss":"";

  // 持股明細（篩選後）— 加排序
  const lotsData=getLots(sel,fb,fo).map(l=>({
    date:l.date, broker:l.broker||'', operator:l.operator||'',
    shares:l.shares, cpp:l.cpp,
    cost:l.cpp*l.shares,
    pnl:price?(price*(1-FEE_RATE)-l.cpp)*l.shares:null,
    id:l.id
  }));
  const lotsSorted=sortedRows(lotsData,lotsSort);
  const lotsRows=lotsSorted.length===0
    ?`<tr><td colspan="7" style="text-align:center;padding:1.5rem;color:var(--text3)">無持股（可能全數賣出或被篩選）</td></tr>`
    :lotsSorted.map(l=>{
      const lc=l.pnl!=null?(l.pnl>0?"gain":l.pnl<0?"loss":""):"";
      return `<tr>
        <td>${l.date}</td>
        <td><span class="badge badge-broker">${l.broker||"--"}</span></td>
        <td><span class="badge badge-op">${l.operator||"--"}</span></td>
        <td>${fmt(l.shares)} 股</td>
        <td>${fmtP(l.cpp)} 元</td>
        <td>${fmt(Math.round(l.cost))} 元</td>
        <td class="${lc}">${l.pnl!=null?fmtS(Math.round(l.pnl))+" 元":"--"}</td>
      </tr>`;
    }).join("");

  // 交易紀錄（依券商/操作人篩選）
  const allLots=(s.lots||[]).filter(l=>{
    if(fb&&fb!=="全部"&&l.broker!==fb) return false;
    if(fo&&fo!=="全部"&&l.operator!==fo) return false;
    return true;
  });
  // 計算每筆賣出的已實現損益（用全部 lots 做 FIFO，不受篩選影響）
  const sellPnlMap={};
  {
    const allLotsForFifo=s.lots||[];
    const buyQ2=allLotsForFifo.filter(l=>l.type==="buy").sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id)
      .map(l=>({...l,rem:l.shares,cpp:l.total/l.shares}));
    allLotsForFifo.filter(l=>l.type==="sell").sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id)
      .forEach(sell=>{
        const spp=sell.total/sell.shares;
        let left=sell.shares,costSum=0;
        while(left>0&&buyQ2.length>0){
          const b=buyQ2[0];if(b.rem===0){buyQ2.shift();continue;}
          const take=Math.min(b.rem,left);costSum+=take*b.cpp;b.rem-=take;left-=take;
          if(b.rem===0) buyQ2.shift();
        }
        const matched=sell.shares-left;
        if(matched>0) sellPnlMap[sell.id]=Math.round((spp-(costSum/matched))*matched);
      });
  }
  // 交易紀錄 — 加排序
  const histData=allLots.map(l=>{
    const isSell=l.type==="sell";
    const spnl=isSell&&sellPnlMap[l.id]!==undefined?sellPnlMap[l.id]:null;
    return {date:l.date,broker:l.broker||'',operator:l.operator||'',type:l.type,
      shares:l.shares,price:l.total/l.shares,total:l.total,spnl,id:l.id};
  });
  const histSorted=sortedRows(histData,histSort);
  const histRows=histSorted.length===0
    ?`<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:var(--text3)">無交易記錄</td></tr>`
    :histSorted.map(l=>{
      const isSell=l.type==="sell";
      const spc=l.spnl!==null?(l.spnl>0?"gain":l.spnl<0?"loss":""):"";
      return `<tr>
        <td>${l.date}</td>
        <td><span class="badge badge-broker">${l.broker||"--"}</span></td>
        <td><span class="badge badge-op">${l.operator||"--"}</span></td>
        <td><span class="tag ${isSell?"tag-sell":"tag-buy"}">${isSell?"賣出":"買進"}</span></td>
        <td>${fmt(l.shares)} 股</td>
        <td>${fmt(Math.round(l.price))} 元</td>
        <td class="${spc}" style="font-size:12px">${l.spnl!==null?fmtS(l.spnl)+" 元":"--"}</td>
        <td><div class="action-cell">
          <button class="btn btn-sm btn-warn" onclick="oM('edit-tx:${l.id}')"><i class="ti ti-edit"></i></button>
          <button class="btn btn-sm btn-danger" onclick="delTx(${l.id})"><i class="ti ti-trash"></i></button>
        </div></td>
      </tr>`;
    }).join("");

  const divRows=(s.dividends||[]).length===0
    ?`<div class="empty" style="padding:2rem">尚無股利記錄</div>`
    :(s.dividends||[]).slice().reverse().map(d=>`<div class="div-item">
        <span style="color:var(--text2)">${d.date}</span>
        <span style="flex:1">${d.note||""}</span>
        <span style="font-weight:500">+${fmt(d.amount)} 元</span>
        <button class="btn btn-sm btn-danger" onclick="delDiv(${d.id})"><i class="ti ti-trash"></i></button>
      </div>`).join("");

  const rpnlRows=rpnlRec.length===0
    ?`<tr><td colspan="6" style="text-align:center;padding:1.5rem;color:var(--text3)">尚無賣出記錄</td></tr>`
    :rpnlRec.map(r=>{
      const rc=r.pnl>0?"gain":r.pnl<0?"loss":"";
      return `<tr>
        <td>${r.sellDate}</td><td>${fmt(r.sellShares)} 股</td>
        <td>${fmt(Math.round(r.sellPrice))} 元</td>
        <td>${fmt(Math.round(r.buyAvgCost))} 元</td>
        <td class="${rc}" style="font-weight:500">${fmtS(r.pnl)} 元</td>
        <td><input type="number" step="any" placeholder="輸入" value="${r.sellIncome??''}"
          style="width:100px;padding:3px 7px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px"
          onchange="saveSellIncome(${r.sellId},this.value,'${sel}')"/> 元</td>
      </tr>`;
    }).join("");

  // 篩選 bar（detail 頁也可篩）
  const tBr=tickerBrokers(sel);
  const tOp=tickerOperators(sel);
  const detailFilterHtml=(tBr.length>1||tOp.length>1)
    ?`<div class="filter-section" style="margin-bottom:1rem">
        ${tBr.length>1?`<div class="filter-row"><span class="filter-label">券商</span>
          ${["全部",...tBr].map(b=>`<span class="chip${fb===b?" active":""}" onclick="setBroker('${b}')">${b}</span>`).join("")}
        </div>`:""}
        ${tOp.length>1?`<div class="filter-row"${tBr.length>1?' style="margin-top:6px"':""}>
          <span class="filter-label">操作人</span>
          ${["全部",...tOp].map(o=>`<span class="chip${fo===o?" active":""}" onclick="setOperator('${o}')">${o}</span>`).join("")}
        </div>`:""}
      </div>`
    :"";

  const tabContent=activeTab==="lots"
    ?`<div class="price-row">
        <label>手動輸入股價</label>
        <input type="number" step="any" value="${price||""}" placeholder="或點更新收盤價" onchange="updatePrice(this.value)"/>

// SORT HELPERS
// ════════════════════════════════════════════════════════
function sortToggle(sortObj, key){
  if(sortObj.key===key){
    sortObj.dir=sortObj.dir==='asc'?'desc':'asc';
  } else {
    sortObj.key=key; sortObj.dir='desc';
  }
  render();
}
window.sortLots=key=>sortToggle(lotsSort,key);
window.sortHist=key=>sortToggle(histSort,key);

function sortedRows(rows, sortState){
  if(!sortState.key||!sortState.dir) return rows;
  return [...rows].sort((a,b)=>{
    let av=a[sortState.key]??'', bv=b[sortState.key]??'';
    // 日期欄位：ISO 格式 YYYY-MM-DD 直接字串比較
    const isDate=v=>typeof v==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(v);
    if(isDate(av)){
      av=String(av);bv=String(bv);
    } else if(typeof av==='number'||(typeof av==='string'&&av!==''&&!isNaN(Number(av)))){
      av=Number(av)||0;bv=Number(bv)||0;
    } else {
      av=String(av);bv=String(bv);
    }
    if(av<bv) return sortState.dir==='asc'?-1:1;
    if(av>bv) return sortState.dir==='asc'?1:-1;
    return 0;
  });
}

function thSort(label, key, sortState){
  const cls=sortState.key===key?(sortState.dir==='asc'?'sort-asc':'sort-desc'):'';
  return `<th class="sortable ${cls}" onclick="${sortState===lotsSort?'sortLots':'sortHist'}('${key}')">${label}<span class="sort-icon"></span></th>`;
}

function smartDateHtml(id, value){
  const val=value||today();
  return `<div class="date-input-wrap">
    <input class="date-input-native" id="${id}" type="date" value="${val}" autocomplete="off"/>
    <div class="date-quick-btns">
      <button type="button" class="date-quick-btn" onclick="setQuickDate('${id}',0)">今天</button>
      <button type="button" class="date-quick-btn" onclick="setQuickDate('${id}',-1)">昨天</button>
      <button type="button" class="date-quick-btn" onclick="setQuickDate('${id}',-7)">上週</button>
      <button type="button" class="date-quick-btn" onclick="setQuickDate('${id}',-30)">上個月</button>
    </div>
  </div>`;
}

window.setQuickDate=function(id, offsetDays){
  const el=document.getElementById(id);
  if(!el) return;
  const d=new Date();
  d.setDate(d.getDate()+offsetDays);
  el.value=d.toISOString().slice(0,10);
};

function getSmartDate(id){
  const el=document.getElementById(id);
  if(!el) return '';
  return el.value.trim();
}

// ════════════════════════════════════════════════════════
// AUTOCOMPLETE
// ════════════════════════════════════════════════════════
let _acItems=[],_acIdx=-1;
function bindSearchModal(){
  getStockList().then(()=>{});
  // 等 DOM render 完再綁
  setTimeout(()=>{
    const input=document.getElementById('m-search');
    if(!input||input._imeBound) return;
    input._imeBound=true;
    let _composing=false;
    input.addEventListener('compositionstart',()=>{ _composing=true; });
    input.addEventListener('compositionend',()=>{ _composing=false; handleStockSearch(input.value); });
    input.addEventListener('input',()=>{ if(!_composing) handleStockSearch(input.value); });
    input.addEventListener('keydown',(e)=>handleSearchKey(e));
  },0);
}

window.handleStockSearch=async(q)=>{
  const el=document.getElementById('autocomplete-list');
  if(!el)return;
  if(!q||q.length<1){el.style.display='none';return;}
  // show loading if list not cached
  if(!_stockListCache){
    el.style.display='block';
    el.innerHTML=`<div class="autocomplete-item" style="color:var(--text3)"><span class="spin"></span> 載入股票清單中…</div>`;
  }
  const list=await getStockList();
  const results=filterStocks(list,q);
  _acItems=results;_acIdx=-1;
  if(!results.length){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=results.map((s,i)=>
    `<div class="autocomplete-item" onmousedown="selectAcItem(${i})">
      <span class="autocomplete-code">${s.code}</span>
      <span class="autocomplete-name">${s.name}</span>
    </div>`
  ).join('');
};

window.handleSearchKey=(e)=>{
  const el=document.getElementById('autocomplete-list');
  if(!el||el.style.display==='none')return;
  if(e.key==='ArrowDown'){e.preventDefault();_acIdx=Math.min(_acIdx+1,_acItems.length-1);highlightAc();}
  else if(e.key==='ArrowUp'){e.preventDefault();_acIdx=Math.max(_acIdx-1,0);highlightAc();}
  else if(e.key==='Enter'&&_acIdx>=0){e.preventDefault();selectAcItem(_acIdx);}
  else if(e.key==='Escape'){el.style.display='none';}
};
function highlightAc(){
  document.querySelectorAll('.autocomplete-item').forEach((el,i)=>el.classList.toggle('highlighted',i===_acIdx));
}
window.selectAcItem=i=>{
  const s=_acItems[i];if(!s)return;
  const t=document.getElementById('m-t');
  const n=document.getElementById('m-n');
  const search=document.getElementById('m-search');
  if(t)t.value=s.code;
  if(n)n.value=s.name;
  if(search)search.value=`${s.code} ${s.name}`;
  const el=document.getElementById('autocomplete-list');
  if(el)el.style.display='none';
};

window.doAddStock=()=>{
  const t=(document.getElementById('m-t').value||"").trim();
  const n=(document.getElementById('m-n').value||"").trim();
  const d=parseFloat(document.getElementById('m-d').value)||0;
  if(!t||!n){alert("請填寫股票代號與名稱");return;}
  if(!state.stocks[t]) state.stocks[t]={name:n,lots:[],dividends:[],currentPrice:0,annualDividend:d,priceUpdated:""};
  else state.stocks[t].annualDividend=d;

  const br=(document.getElementById('m-br')?document.getElementById('m-br').value:"");
  const op=(document.getElementById('m-op')?document.getElementById('m-op').value:"");
  const txDate=getSmartDate('m-tx-date');
  const txType=document.getElementById('m-tx-type').value;
  const txShares=parseInt(document.getElementById('m-tx-shares').value)||0;
  const txTotal=parseFloat(document.getElementById('m-tx-total').value)||0;
  if(txDate&&txShares>0&&txTotal>=0){
    state.stocks[t].lots.push({id:state.nextId++,date:txDate,type:txType,shares:txShares,total:txTotal,broker:br,operator:op});
  }
  save();modal=null;sel=t;view="detail";activeTab="lots";render();
};

window.doAddTx=()=>{
  const br=(document.getElementById('m-br')?document.getElementById('m-br').value:"");
  const op=(document.getElementById('m-op')?document.getElementById('m-op').value:"");
  const date=getSmartDate('m-date');
  const type=document.getElementById('m-type').value;
  const shares=parseInt(document.getElementById('m-shares').value)||0;
  const total=parseFloat(document.getElementById('m-total').value)||0;
  if(!date||shares<=0||total<0){alert("請填寫完整資訊");return;}
  state.stocks[sel].lots.push({id:state.nextId++,date,type,shares,total,broker:br,operator:op});
  save();modal=null;render();
};

window.doEditTx=id=>{
  const br=(document.getElementById('m-br')?document.getElementById('m-br').value:"");
  const op=(document.getElementById('m-op')?document.getElementById('m-op').value:"");
  const date=getSmartDate('m-date');
  const type=document.getElementById('m-type').value;
  const shares=parseInt(document.getElementById('m-shares').value)||0;
  const total=parseFloat(document.getElementById('m-total').value)||0;
  if(!date||shares<=0||total<0){alert("請填寫完整資訊");return;}
  const idx=(state.stocks[sel].lots||[]).findIndex(l=>l.id===id);
  if(idx>=0) state.stocks[sel].lots[idx]={id,date,type,shares,total,broker:br,operator:op};
  save();modal=null;render();
};

window.doAddDiv=()=>{
  const date=getSmartDate('m-date');
  const amount=parseFloat(document.getElementById('m-amount').value)||0;
  const note=(document.getElementById('m-note').value||"").trim();
  const ann=parseFloat(document.getElementById('m-ann').value);

  if(!isNaN(ann)) state.stocks[sel].annualDividend=ann;
  save();modal=null;render();
};

window.doEditStock=()=>{
  state.stocks[sel].annualDividend=parseFloat(document.getElementById('m-d').value)||0;

};

window.doDeleteStock=()=>{
  if(!confirm(`確定刪除「${state.stocks[sel].name}」及所有記錄？`))return;

};

window.delTx=id=>{

  state.stocks[sel].lots=(state.stocks[sel].lots||[]).filter(l=>l.id!==id);

window.delDiv=id=>{

window.doAddBroker=()=>{

window.doAddOperator=()=>{

};
window.deleteOperator=i=>{
  state.operators.splice(i,1);save();

window.saveSellIncome=(id,val,ticker)=>{
  const t=ticker||sel;
  if(!t||!state.stocks[t]) return;
  const lot=(state.stocks[t].lots||[]).find(l=>l.id===id);
  if(!lot) return;
  const v=parseFloat(val);
  lot.sellIncome=isNaN(v)||val===''?null:v;
  save();
};
